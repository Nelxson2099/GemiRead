<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GemiRead</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="theme-dark">
  <div class="container">
    <header>
      <h1>GemiRead</h1>
      <button id="theme-toggle" class="icon-btn" aria-label="Cambiar tema">
        <!-- Sun icon (for switching to light mode) -->
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon (for switching to dark mode) -->
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </header>

    <main>
      <div class="stats-card">
        <h2 class="stats-title">Hoy has leído</h2>
        <div class="pages-display">
          <span id="pages-count" class="counter">0</span>
          <span class="pages-label">Páginas</span>
        </div>
        <p class="words-detail"><span id="words-count">0</span> palabras (250/pág)</p>
      </div>

      <div class="progress-section">
        <div class="progress-header">
          <span>Meta diaria: 10 págs</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
